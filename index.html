<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text File Viewer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Consolas,monospace;
}

body{
    background:#0b0f1a;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    height:90%;
    background:#121827;
    border-radius:18px;
    overflow:hidden;
    border:1px solid #2b3555;
    box-shadow:0 0 40px rgba(0,255,255,.15);
}

.header{
    height:60px;
    background:#1d2740;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    color:#00eaff;
    font-size:20px;
}

.buttons{
    display:flex;
    gap:10px;
}

button{
    background:#00d9ff;
    color:#000;
    border:none;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#00a8cc;
    transform:scale(1.05);
}

.preview{
    height:calc(100% - 60px);
    padding:20px;
    overflow:auto;
    white-space:pre-wrap;
    line-height:1.6;
    color:#d9f8ff;
}

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:#00d9ff;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
    📄 Text Viewer

    <div class="buttons">
        <button onclick="copyText()">📋 Copy</button>
        <button onclick="downloadText()">⬇️ Download</button>
    </div>
</div>

<div class="preview" id="preview">
Loading...
</div>

</div>


<script>

const text = `PASTE YOUR TEXT HERE`;

document.getElementById("preview").textContent = text;


// Copy button
function copyText(){

navigator.clipboard.writeText(text).then(()=>{

alert("Text copied!");

});

}


// Download button
function downloadText(){

const blob = new Blob(
[text],
{type:"text/plain"}
);

const url = URL.createObjectURL(blob);

const link=document.createElement("a");

link.href=url;

link.download="text-file.txt";

link.click();

URL.revokeObjectURL(url);

}

</script>

</body>
</html>
